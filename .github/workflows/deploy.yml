name: Despliegue Continuo VZeta

on:
  push:
    branches:
      - main  # Cambiar a master si usas esa rama

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el codigo en el servidor de GitHub
        uses: actions/checkout@v4

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compilar y subir imagen a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/proyecto-vzeta:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Conectarse a AWS y actualizar el Contenedor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/proyecto-vzeta:latest
            sudo docker stop vzeta-app || true
            sudo docker rm vzeta-app || true
            mkdir -p /home/ubuntu/vzeta_data
            sudo docker run -d \
              --name vzeta-app \
              -p 80:80 \
              -v /home/ubuntu/vzeta_data:/usr/share/nginx/html \
              ${{ secrets.DOCKERHUB_USERNAME }}/proyecto-vzeta:latest
